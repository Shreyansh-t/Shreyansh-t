  <text x="18" y="154" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">shreyansh  </text>
  <text x="118" y="154" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">    1  </text>
  <text x="178" y="154" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">   0.1  </text>
  <text x="248" y="154" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">   0.4  </text>

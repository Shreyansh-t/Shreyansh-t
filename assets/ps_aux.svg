  <text x="118" y="106" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41"> 3141  </text>
  <text x="178" y="106" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  41.2  </text>

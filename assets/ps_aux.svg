<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" fill="#000000"/>
  <rect x="1" y="1" width="998" height="258" fill="none" stroke="#00FF41" stroke-width="1" filter="url(#glow)"/>

  <!-- Header row -->
  <text x="18" y="30" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#008F11">USER        PID    %CPU   %MEM   STAT   TIME    COMMAND</text>

  <!-- Divider -->
  <line x1="18" y1="38" x2="982" y2="38" stroke="#003311" stroke-width="1"/>

  <!-- Row 1: duckdb-trace (R+ = bright green) -->
  <text x="18" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">shreyansh  </text>
  <text x="118" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41"> 1337  </text>
  <text x="178" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  87.3  </text>
  <text x="248" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  62.1  </text>
  <text x="318" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#39FF14" filter="url(#glow)" font-weight="bold">  R+  </text>
  <text x="368" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  12:04  </text>
  <text x="438" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">duckdb-trace --target=create_index --gdb</text>

  <!-- Row 2: rag-chatbot -->
  <text x="18" y="82" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">shreyansh  </text>
  <text x="118" y="82" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41"> 2042  </text>
  <text x="178" y="82" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  64.5  </text>
  <text x="248" y="82" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  45.8  </text>
  <text x="318" y="82" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">   S   </text>

  <text x="368" y="130" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  01:18  </text>
  <text x="438" y="130" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">read-papers --queue=infinite</text>


  <text x="368" y="154" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#00FF41">  21yr  </text>
  <text x="438" y="154" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="12" fill="#008F11">/sbin/init --user=shreyansh</text>

  <!-- Bottom hint -->

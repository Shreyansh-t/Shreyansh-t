  <text x="320" y="40" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="14" fill="#39FF14" filter="url(#glow)" font-weight="bold">shreyansh@portfolio</text>
  <text x="320" y="58" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13" fill="#00FF41" filter="url(#glow)">&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;</text>


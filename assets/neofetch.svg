    <tspan x="28" dy="17">  &#x2502;  &#x2588;&#x2588;       &#x2588;&#x2588;&#x2588;  &#x2502;</tspan>
    <tspan x="28" dy="17">  &#x2502;  &#x2588;&#x2588;   &gt;_   &#x2588;&#x2588;&#x2588;  &#x2502;</tspan>
    <tspan x="28" dy="17">  &#x2502;  &#x2588;&#x2588;       &#x2588;&#x2588;&#x2588;  &#x2502;</tspan>
    <tspan x="28" dy="17">  &#x2502;  &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;  &#x2502;</tspan>
    <tspan x="28" dy="17">  &#x2502;  &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;  &#x2502;</tspan>
    <tspan x="28" dy="17">  &#x2514;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2518;</tspan>
    <tspan x="28" dy="17">      &#x2502;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2502;</tspan>

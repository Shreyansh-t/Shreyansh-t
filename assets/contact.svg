<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="180" fill="#000000"/>
  <rect x="1" y="1" width="698" height="178" fill="none" stroke="#00FF41" stroke-width="1" filter="url(#glow)"/>

  <!-- Command line -->
  <text x="18" y="30" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13" fill="#39FF14" filter="url(#glow)">$ ./contact.sh</text>

  <!-- [ OK ] github.service -->
  <text x="18" y="55" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13">
    <tspan fill="#39FF14" filter="url(#glow)">[ OK ]</tspan>
    <tspan fill="#00FF41">  github.service    </tspan>
    <tspan fill="#008F11">&#x2192; github.com/Shreyansh-t</tspan>
  </text>

  <!-- [ OK ] email.service -->
  <text x="18" y="78" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13">
    <tspan fill="#39FF14" filter="url(#glow)">[ OK ]</tspan>
    <tspan fill="#00FF41">  email.service     </tspan>
    <tspan fill="#008F11">&#x2192; 1209shreyansh.tehanguria@gmail.com</tspan>
  </text>

  <!-- [ OK ] linkedin.service -->
  <text x="18" y="101" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13">
    <tspan fill="#39FF14" filter="url(#glow)">[ OK ]</tspan>
    <tspan fill="#00FF41">  linkedin.service  </tspan>
    <tspan fill="#008F11">&#x2192; linkedin.com/in/shreyansh-tehanguria</tspan>
  </text>

  <!-- [ OK ] website.service -->
  <text x="18" y="124" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13">
    <tspan fill="#39FF14" filter="url(#glow)">[ OK ]</tspan>
    <tspan fill="#00FF41">  website.service   </tspan>
    <tspan fill="#008F11">&#x2192; shreyansh-t.github.io</tspan>
  </text>

  <!-- [ OK ] resume.pdf -->
  <text x="18" y="147" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="13">
    <tspan fill="#39FF14" filter="url(#glow)">[ OK ]</tspan>
    <tspan fill="#00FF41">  resume.pdf        </tspan>
    <tspan fill="#008F11">&#x2192; cat resume.pdf</tspan>
  </text>
</svg>

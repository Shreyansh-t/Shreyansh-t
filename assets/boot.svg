<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#000000"/>
  <!-- Border with glow -->
  <rect x="1" y="1" width="1198" height="418" fill="none" stroke="#00FF41" stroke-width="1" filter="url(#glow)"/>

  <!-- BIOS POST lines (0.0s - 1.5s), each ~80ms apart -->
  <!-- Line 1: 0.0s -->
  <text x="30" y="50" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    TEHANGURIA BIOS v2.6.4 (C) 2026
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Line 2: 0.2s -->
  <text x="30" y="72" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    Memory test: 32768K OK
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Line 3: 0.4s -->
  <text x="30" y="94" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    Detecting IDE drives... DONE
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Line 4: 0.6s -->
  <text x="30" y="116" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    Booting from /dev/sda1...
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Kernel lines (1.5s - 3.0s) -->
  <!-- Kernel line 1 -->
  <text x="30" y="148" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    <tspan fill="#39FF14">[  OK  ]</tspan> Started caffeine.service
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Kernel line 2 -->
  <text x="30" y="170" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    <tspan fill="#39FF14">[  OK  ]</tspan> Mounted /dev/brain
    <animate attributeName="opacity" from="0" to="1" begin="1.85s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Kernel line 3 -->
  <text x="30" y="192" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    <tspan fill="#39FF14">[  OK  ]</tspan> Reached target Multi-User System
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Kernel line 4 -->
  <text x="30" y="214" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    <tspan fill="#39FF14">[  OK  ]</tspan> Started Compulsive Optimization Daemon
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Login sequence (3.0s - 4.0s) -->
  <!-- "login: " appears at 3.0s -->
  <text x="30" y="246" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#39FF14" filter="url(#glow)" opacity="0">
    login:
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- "shreyansh" typed char by char after "login: " -->
  <text x="115" y="246" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)">
    <tspan opacity="0">s<animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">h<animate attributeName="opacity" from="0" to="1" begin="3.16s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">r<animate attributeName="opacity" from="0" to="1" begin="3.22s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">e<animate attributeName="opacity" from="0" to="1" begin="3.28s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">y<animate attributeName="opacity" from="0" to="1" begin="3.34s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">a<animate attributeName="opacity" from="0" to="1" begin="3.40s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">n<animate attributeName="opacity" from="0" to="1" begin="3.46s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">s<animate attributeName="opacity" from="0" to="1" begin="3.52s" dur="0.05s" fill="freeze"/></tspan><tspan opacity="0">h<animate attributeName="opacity" from="0" to="1" begin="3.58s" dur="0.05s" fill="freeze"/></tspan>
  </text>

  <!-- "Password: " line appears at 3.65s -->
  <text x="30" y="268" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#39FF14" filter="url(#glow)" opacity="0">
    password:
    <animate attributeName="opacity" from="0" to="1" begin="3.65s" dur="0.05s" fill="freeze"/>
  </text>
  <text x="130" y="268" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#008F11" filter="url(#glow)" opacity="0">
    &#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;
    <animate attributeName="opacity" from="0" to="1" begin="3.75s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- MOTD (4.0s - 5.5s) -->
  <text x="30" y="300" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#39FF14" filter="url(#glow)" opacity="0">
    Welcome to PortfolioOS 4.2.0-arch
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.05s" fill="freeze"/>
  </text>

  <text x="30" y="322" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="15" fill="#00FF41" filter="url(#glow)" opacity="0">
    Last login: Mon Jun  9 2026 on tty1
    <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Prompt line with blinking cursor -->
  <text x="30" y="370" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="18" fill="#39FF14" filter="url(#glowStrong)" opacity="0" font-weight="bold">
    $
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.05s" fill="freeze"/>
  </text>

  <!-- Blinking block cursor after $ -->
  <rect x="52" y="354" width="11" height="20" fill="#39FF14" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.05s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.8s" begin="4.7s" repeatCount="indefinite"/>
  </rect>
</svg>

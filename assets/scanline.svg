<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 12" width="1200" height="12">
  <defs>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="20%" stop-color="#39FF14" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="1"/>
      <stop offset="80%" stop-color="#39FF14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="12" fill="#000000"/>

  <!-- Scanline that translates left to right -->
  <rect x="-400" y="4" width="400" height="4" fill="url(#scanGrad)" filter="url(#glow)">
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 0"
      to="1600 0"
      dur="4s"
      repeatCount="indefinite"/>
  </rect>
</svg>
